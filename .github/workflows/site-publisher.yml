name: Deploy Podval Site Publisher site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out
        uses: actions/checkout@v6

      # Site Publisher Steps

      - name: Set up Java 21 used by the Site Publisher
        uses: actions/setup-java@v5
        with:
          distribution: 'oracle'
          java-version: '21'

      - name: Set SITE_PUBLISHER_ROOT environment variable
        run: echo "SITE_PUBLISHER_ROOT=.site_publisher" >> $GITHUB_ENV

      - name: Check Out Site Publisher
        uses: actions/checkout@v6
        with:
          repository: 'dubinsky/site-publisher'
          path: ${{ env.SITE_PUBLISHER_ROOT }}

      - name: Generate Site using Site Publisher
        run: |
          cd $SITE_PUBLISHER_ROOT
          ./gradlew run --args="$GITHUB_WORKSPACE --treat-errors-as-warnings=true"

      - name: Upload GitHub Pages from './_site' as an Artifact
        uses: actions/upload-pages-artifact@v5

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
